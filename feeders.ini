# ADS-B Stack Monitor - Feeder Configuration
# Add, remove, or edit feeders here. No code changes needed.
#
# Section types:
#   [service:<systemd-unit-name>]  - monitors a systemd service
#   [docker:<container-name>]      - monitors a Docker container
#
# Keys:
#   label = Display name shown in the UI
#   hint  = One-line detail shown under the label (optional)
#   icon  = Tabler icon name without "ti-" prefix (optional, default: plug)

# ── Core (do not remove these) ────────────────────────────────────────────────

[service:airspy_adsb]
label = airspy_adsb
hint  = 12 MSPS · gain 21 · Beast → :30004
icon  = antenna

[service:readsb]
label = readsb
hint  = net-only · Beast out → :30005
icon  = broadcast

[service:tar1090]
label = tar1090
hint  = Web map → :8504
icon  = map

# ── Feeders ───────────────────────────────────────────────────────────────────

[service:fr24feed]
label = FlightRadar24
hint  = Config: /etc/fr24feed.ini
icon  = plane

[service:piaware]
label = FlightAware
hint  = Beast in ← :30005
icon  = plane-departure

[service:adsbexchange-feed]
label = ADSBExchange feed
hint  = Beast in ← :30005
icon  = world

[service:adsbexchange-mlat]
label = ADSBExchange MLAT
hint  = MLAT → feed.adsbexchange.com:31090
icon  = world

[service:adsbfi-feed]
label = adsb.fi
hint  = Beast in ← :30005
icon  = globe

[docker:airnavradar]
label = AirNav Radar
hint  = Station: EXTRPI716253
icon  = radar-2
