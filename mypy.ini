# Incremental typing: lenient by default, strict per module as each gets
# hinted. Add a [mypy-system.X] block below when module X gets typed;
# everything else stays silent until its turn.
[mypy]
ignore_errors = True

[mypy-system.init_adapter]
ignore_errors = False
disallow_untyped_defs = True
warn_return_any = True

